name: Continuous Training Pipeline

on:
  schedule:
    - cron: '0 0 * * 0'
  repository_dispatch:
    types: [grafana_alert_retrain]

jobs:
  continuous_training:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies & DVC
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc dvc-s3

      - name: Configure DVC Remote Authentication
        run: |
          echo "Injecting DagsHub credentials into DVC local config..."
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ github.repository_owner }}
          dvc remote modify origin --local password ${{ secrets.AWS_ACCESS_KEY_ID }}

      - name: Pull Latest Dataset via DVC
        run: |
          echo "Executing authenticated pull..."
          dvc pull

      - name: Execute Model Retraining
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          DAGSHUB_USER_TOKEN: ${{ secrets.AWS_ACCESS_KEY_ID }}
          MLFLOW_TRACKING_USERNAME: ${{ github.repository_owner }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.AWS_ACCESS_KEY_ID }}
        run: |
          echo "Starting model retraining on latest data..."
          python src/train.py

      - name: Evaluate and Promote (Champion vs Challenger)
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          DAGSHUB_USER_TOKEN: ${{ secrets.AWS_ACCESS_KEY_ID }}
          MLFLOW_TRACKING_USERNAME: ${{ github.repository_owner }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.AWS_ACCESS_KEY_ID }}
        run: |
          echo "Comparing Challenger model against current Champion..."
          python src/evaluate_and_promote.py