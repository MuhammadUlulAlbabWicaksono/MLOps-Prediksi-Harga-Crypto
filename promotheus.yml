global:
  scrape_interval: 5s     
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'prometheus_self'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'model_inference_cluster'
    metrics_path: '/metrics'
    dns_sd_configs:
      - names: ['model-serving-api']
        type: 'A'
        port: 8080