name: MLOps Automation Pipeline

# Pemicu Pipeline
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    
    # Variabel Lingkungan
    env:
      MLFLOW_TRACKING_URI: https://dagshub.com/MuhammadUlulAlbabWicaksono/mlops-prediksi-harga-crypto.mlflow
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest dagshub dvc dvc-s3

      # Autentikasi DVC
      - name: Configure DVC Credentials
        run: |
          dvc remote add -d origin https://dagshub.com/MuhammadUlulAlbabWicaksono/MLOps-Prediksi-Harga-Crypto.dvc --force
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}

      - name: Pull Data via DVC
        run: dvc pull

      - name: Tahap 1 - Automated Testing
        run: pytest tests/test_pipeline.py -v

      - name: Tahap 2 - Automated Training
        run: python src/train.py

      - name: Tahap 3 & 4 - Evaluation & Auto-Registry
        run: python src/evaluate_and_register.py